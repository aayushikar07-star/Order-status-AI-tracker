<!DOCTYPE html>
<html>
<head>
    <title>AI Order Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <h2>Order Chatbot 🤖</h2>

        <div id="chatbox"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask about your order" onkeypress="handleKey(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
